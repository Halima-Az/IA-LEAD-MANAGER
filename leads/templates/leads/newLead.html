{% extends 'base.html' %}
{% block nav_add %}active {% endblock %}
{% block content %}

<div class="container">

    <h1>Ajouter un Lead</h1>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>{{ form.name.label }}</label>
            {{ form.name }}
            {{ form.name.errors }}
        </div>

        <div class="form-group">
            <label>{{ form.email.label }}</label>
            {{ form.email }}
            {{ form.email.errors }}
        </div>

        <div class="form-group">
            <label>{{ form.message.label }}</label>
            {{ form.message }}
            {{ form.message.errors }}
        </div>

        <button type="submit">
            Enregistrer
        </button>

    </form>

</div>

{% endblock %}
